name: Build & Distribute Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'New internal build'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 (required by Gradle)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Install JS dependencies
      #    Delete stale lockfile to prevent expo-dev-client from being reinstalled
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      # 5. Generate native Android project from Expo config
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # 6. Enable JS bundling in debug builds
      #    By default assembleDebug expects Metro — this makes it bundle JS into the APK
      - name: Enable JS bundle in debug APK
        run: |
          mkdir -p android/app/src/main/assets
          echo "bundleInDebug=true" >> android/gradle.properties

      # 7. Make Gradle executable
      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      # 8. Strip unused CPU architectures — arm64-v8a covers all modern Android phones
      - name: Configure ABI split (arm64-v8a only)
        run: |
          cat >> android/app/build.gradle << 'EOF'

          // Build only for arm64-v8a to reduce APK size
          android {
            splits {
              abi {
                enable true
                reset()
                include "arm64-v8a"
                universalApk false
              }
            }
            packagingOptions {
              jniLibs {
                excludes += ["**/armeabi-v7a/**", "**/x86/**", "**/x86_64/**"]
              }
            }
          }
          EOF

      # 9. Build APK
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      # 10. Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 11. Upload to Firebase App Distribution
      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes || 'New build' }}
        run: |
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/debug/app-arm64-v8a-debug.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "internal-team" \
            --release-notes "$RELEASE_NOTES"
