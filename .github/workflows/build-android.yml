name: Build & Distribute Android APK

on:
  # Auto-build on every push to main
  push:
    branches: [main]
  # Manual trigger with custom release notes
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'New internal build'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 (required by Gradle)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Install JS dependencies
      - name: Install dependencies
        run: npm install

      # 5. Generate native Android project from Expo config
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # 6. Make Gradle executable
      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      # 7. Build debug APK (no signing key needed)
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      # 8. Upload to Firebase App Distribution → team gets notified by email
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: internal-team
          file: android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: ${{ github.event.inputs.release_notes || github.event.head_commit.message }}
