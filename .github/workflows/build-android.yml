name: Build & Distribute Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'New internal build'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java 17 (required by Gradle)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 4. Install JS dependencies
      #    Delete stale lockfile to prevent expo-dev-client from being reinstalled
      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      # 5. Generate native Android project from Expo config
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # 6. Make Gradle executable
      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      # 7. Strip unused CPU architectures — arm64-v8a covers all modern Android phones
      - name: Configure ABI split (arm64-v8a only)
        run: |
          cat >> android/app/build.gradle << 'EOF'

          // Build only for arm64-v8a to reduce APK size
          android {
            splits {
              abi {
                enable true
                reset()
                include "arm64-v8a"
                universalApk false
              }
            }
            packagingOptions {
              jniLibs {
                excludes += ["**/armeabi-v7a/**", "**/x86/**", "**/x86_64/**"]
              }
            }
          }
          EOF

      # 8. Generate a throwaway release keystore so we can build a release APK.
      #    Release builds ALWAYS bundle the JS — debug builds try to load from
      #    Metro at runtime, which is why they show "Unable to load script".
      - name: Generate release keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias releasekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android123 \
            -keypass android123 \
            -dname "CN=Aero Test Manager,O=Aerosimple,C=US"

      # 9. Build release APK — Gradle automatically bundles JS for release variants
      - name: Build APK
        run: |
          cd android && ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/release.keystore \
            -Pandroid.injected.signing.store.password=android123 \
            -Pandroid.injected.signing.key.alias=releasekey \
            -Pandroid.injected.signing.key.password=android123

      # 10. Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 11. Upload to Firebase App Distribution
      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes || 'New build' }}
        run: |
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/release/app-arm64-v8a-release.apk \
            --app "$FIREBASE_APP_ID" \
            --groups "internal-team" \
            --release-notes "$RELEASE_NOTES"
